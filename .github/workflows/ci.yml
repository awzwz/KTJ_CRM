# Continuous integration: shared Python import sanity check + Docker image builds.
#
# Required repository setup: none (uses public actions + runner Docker).
# Optional: tune concurrency if you run many workflows in parallel.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (shared modules)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared stack dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          pip install \
            "pydantic[email]" \
            pydantic-settings \
            sqlalchemy \
            asyncpg

      - name: Verify shared packages import
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import shared.config
          import shared.database
          import shared.models
          import shared.schemas
          import shared.constants
          print("OK: shared.config, database, models, schemas, constants")
          PY

  build:
    name: Build (Docker services)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application images (compose)
        # Builds only app services listed below — no registry push (see deploy workflow).
        # Infra images (postgres, redis, etc.) are pulled at runtime, not built here.
        run: |
          set -euo pipefail
          docker compose build \
            gateway \
            auth \
            webhook \
            bot \
            llm \
            crm \
            routing \
            analytics \
            notification
