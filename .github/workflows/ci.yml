# Continuous integration: shared Python import sanity check + Docker image builds.
#
# Required repository setup: none (uses public actions + runner Docker).
# Optional: tune concurrency if you run many workflows in parallel.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (shared modules)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared stack dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          pip install \
            "pydantic[email]" \
            pydantic-settings \
            "sqlalchemy[asyncio]" \
            asyncpg

      - name: Verify shared packages import
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: "sqlite+aiosqlite:///test.db"
        run: |
          set -euo pipefail
          pip install aiosqlite
          python -c "
          import shared.config
          print('OK: shared.config')
          import shared.database
          print('OK: shared.database')
          import shared.constants
          print('OK: shared.constants')
          import shared.models
          print('OK: shared.models')
          import shared.schemas
          print('OK: shared.schemas')
          print('ALL SHARED MODULES OK')
          "

  build:
    name: Build (Docker services)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application images (compose)
        run: |
          set -euo pipefail
          docker compose build \
            gateway \
            auth \
            webhook \
            bot \
            llm \
            crm \
            routing \
            analytics \
            notification
